<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manoo FX — Dashboard</title>
<style>
  :root {
    --bg: #0d0614;
    --panel: #170a26;
    --gradient: linear-gradient(90deg, #6d28d9, #a21caf);
    --text: #f2e9ff;
    --muted: #b9a8d1;
    --ok: #4ade80;
    --err: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #0a0510;
    gap: 10px;
  }
  .topbar .left, .topbar .right { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    background: none; border: none; color: var(--text);
    font-size: 20px; cursor: pointer; padding: 4px;
  }
  .currency-pill, .balance-pill {
    display: flex; align-items: center; gap: 6px;
    background: #1e0f33; border: 1px solid #3a1e5c;
    border-radius: 20px; padding: 6px 12px;
    font-size: 14px; font-weight: 600;
    white-space: nowrap; cursor: pointer;
  }
  .balance-pill { flex: 1; justify-content: center; min-width: 0; }
  .badge {
    background: #2b1547; color: var(--pink, #ec4899);
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px;
  }
  .badge.real { color: var(--ok); }
  .transfer-btn {
    background: var(--gradient); color: white; border: none;
    padding: 8px 16px; border-radius: 20px;
    font-weight: 600; font-size: 14px; cursor: pointer;
  }

  .tabnav { display: flex; overflow-x: auto; background: var(--gradient); padding: 0 4px; }
  .tabnav::-webkit-scrollbar { display: none; }
  .tab {
    display: flex; align-items: center; gap: 6px;
    padding: 14px 16px; white-space: nowrap;
    color: rgba(255,255,255,0.75); font-size: 14px; font-weight: 600;
    background: none; border: none; cursor: pointer;
  }
  .tab.active { color: white; background: rgba(255,255,255,0.12); border-radius: 8px 8px 0 0; }

  .content { padding: 20px 16px; }
  .status-line { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
  .status-line .ok { color: var(--ok); }
  .status-line .err { color: var(--err); }
  .account-card {
    background: var(--panel); border: 1px solid #2b1547;
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
  }
  .account-card p { margin: 6px 0; font-size: 14px; color: var(--muted); }
  .account-card p strong { color: var(--text); }
  .login-prompt { text-align: center; padding: 40px 16px; }
  .login-btn {
    display: inline-block; margin-top: 16px;
    background: var(--gradient); color: white;
    padding: 12px 28px; border-radius: 24px;
    font-weight: 700; text-decoration: none; font-size: 15px;
  }

  /* Account switcher dropdown */
  .switcher {
    position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid #3a1e5c; border-radius: 12px;
    padding: 6px; z-index: 10; display: none; min-width: 220px;
  }
  .switcher.open { display: block; }
  .switcher-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  .switcher-item:hover { background: #24123a; }
  .switcher-item.current { background: #2b1547; }
</style>
</head>
<body>

  <div class="topbar" style="position:relative;">
    <div class="left">
      <button class="icon-btn">☰</button>
      <div class="currency-pill" id="currency-pill">USD ▾</div>
    </div>
    <div class="balance-pill" id="balance-pill">
      <span>🅳</span>
      <span class="balance-amount" id="balance-amount">— —</span>
      <span class="badge" id="account-badge">—</span>
      <span>▾</span>
    </div>
    <div class="right">
      <button class="transfer-btn" id="switch-btn">Switch</button>
    </div>
    <div class="switcher" id="switcher"></div>
  </div>

  <div class="tabnav">
    <button class="tab active">📊 Dashboard</button>
    <button class="tab">★ Best Bots</button>
    <button class="tab">⚙ Bot Builder</button>
    <button class="tab">📈 AI Analysis</button>
    <button class="tab">📈 Danalysis</button>
    <button class="tab">🔄 Auto Trades</button>
  </div>

  <div class="content">
    <p class="status-line" id="status">Checking login status...</p>
    <div id="account-card-wrap"></div>
    <div class="login-prompt" id="login-prompt" style="display:none;">
      <p>You're not logged in yet.</p>
      <a href="#" id="deriv-login-btn" class="login-btn">Login with Deriv</a>
    </div>
  </div>

  <script>
    const APP_ID = '33NyIprKo3XAhtN4o99wt';
    const REDIRECT_URI = 'https://manoo-fx.vercel.app/dashboard.html';

    const statusEl = document.getElementById('status');
    const params = new URLSearchParams(window.location.search);

    function loginWithDeriv() {
      const url = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&l=EN`;
      window.location.href = url;
    }

    document.getElementById('deriv-login-btn').addEventListener('click', (e) => {
      e.preventDefault();
      loginWithDeriv();
    });

    // Parses acct1/token1/cur1, acct2/token2/cur2... from the redirect URL
    function parseAccountsFromUrl(params) {
      const accounts = [];
      let i = 1;
      while (params.get(`acct${i}`)) {
        accounts.push({
          loginid: params.get(`acct${i}`),
          token: params.get(`token${i}`),
          currency: params.get(`cur${i}`),
        });
        i++;
      }
      return accounts;
    }

    function isDemo(loginid) {
      return loginid.toUpperCase().startsWith('VR');
    }

    const urlAccounts = parseAccountsFromUrl(params);

    if (urlAccounts.length > 0) {
      // Fresh redirect back from Deriv — save all accounts, clean the URL
      sessionStorage.setItem('deriv_accounts', JSON.stringify(urlAccounts));
      window.history.replaceState({}, '', '/dashboard.html');
      loadAccount(preferredAccount(urlAccounts));
    } else {
      const saved = sessionStorage.getItem('deriv_accounts');
      if (saved) {
        const accounts = JSON.parse(saved);
        loadAccount(preferredAccount(accounts));
      } else {
        showLoginPrompt();
      }
    }

    // Prefer a real account if one exists, otherwise fall back to demo
    function preferredAccount(accounts) {
      const lastUsedId = sessionStorage.getItem('deriv_active_loginid');
      if (lastUsedId) {
        const match = accounts.find(a => a.loginid === lastUsedId);
        if (match) return match;
      }
      return accounts.find(a => !isDemo(a.loginid)) || accounts[0];
    }

    function showLoginPrompt() {
      document.getElementById('login-prompt').style.display = 'block';
      statusEl.textContent = '';
    }

    function buildSwitcher(accounts, activeLoginid) {
      const switcher = document.getElementById('switcher');
      switcher.innerHTML = accounts.map(acc => `
        <div class="switcher-item ${acc.loginid === activeLoginid ? 'current' : ''}" data-loginid="${acc.loginid}">
          <span>${isDemo(acc.loginid) ? 'Demo' : 'Real'} · ${acc.loginid}</span>
          <span>${acc.currency.toUpperCase()}</span>
        </div>
      `).join('');

      switcher.querySelectorAll('.switcher-item').forEach(item => {
        item.addEventListener('click', () => {
          const chosen = accounts.find(a => a.loginid === item.dataset.loginid);
          sessionStorage.setItem('deriv_active_loginid', chosen.loginid);
          switcher.classList.remove('open');
          loadAccount(chosen);
        });
      });
    }

    document.getElementById('switch-btn').addEventListener('click', () => {
      document.getElementById('switcher').classList.toggle('open');
    });

    function loadAccount(account) {
      if (!account) { showLoginPrompt(); return; }

      sessionStorage.setItem('deriv_active_loginid', account.loginid);
      statusEl.textContent = 'Loading your account...';

      const saved = sessionStorage.getItem('deriv_accounts');
      const accounts = saved ? JSON.parse(saved) : [account];
      buildSwitcher(accounts, account.loginid);

      const demo = isDemo(account.loginid);
      document.getElementById('account-badge').textContent = demo ? 'Demo' : 'Real';
      document.getElementById('account-badge').className = 'badge' + (demo ? '' : ' real');

      const ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

      ws.onopen = () => ws.send(JSON.stringify({ authorize: account.token }));

      ws.onmessage = (msg) => {
        const response = JSON.parse(msg.data);

        if (response.error) {
          statusEl.innerHTML = `<span class="err">API error: ${response.error.message}</span>`;
          return;
        }

        if (response.msg_type === 'authorize') {
          ws.send(JSON.stringify({ balance: 1 }));
          const acc = response.authorize;
          document.getElementById('account-card-wrap').innerHTML = `
            <div class="account-card">
              <p><strong>Name:</strong> ${acc.fullname || 'N/A'}</p>
              <p><strong>Login ID:</strong> ${acc.loginid}</p>
              <p><strong>Currency:</strong> ${acc.currency}</p>
              <p><strong>Account type:</strong> ${demo ? 'Demo (virtual funds)' : 'Real money'}</p>
            </div>
          `;
        }

        if (response.msg_type === 'balance') {
          statusEl.innerHTML = `<span class="ok">Account loaded ✓</span>`;
          document.getElementById('balance-amount').textContent =
            `${Number(response.balance.balance).toLocaleString()} ${response.balance.currency}`;
        }
      };

      ws.onerror = () => {
        statusEl.innerHTML = `<span class="err">WebSocket connection failed.</span>`;
      };
    }
  </script>
</body>
</html>
